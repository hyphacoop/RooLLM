server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /chat {
        proxy_pass http://roollm-api:8081;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    location /sessions { proxy_pass http://roollm-api:8081; }
    location /chat-history { proxy_pass http://roollm-api:8081; }
    location /clear-history { proxy_pass http://roollm-api:8081; }
    location /health { proxy_pass http://roollm-api:8081; }
    location /tools { proxy_pass http://roollm-api:8081; }
}
