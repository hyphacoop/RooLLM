name: Release RooLLM Images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: hyphacoop
  MULTITENANT_REPO: hyphacoop/roo-multitenant

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push roollm-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/roollm-api:${{ github.ref_name }}

      - name: Build and push roollm-frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/roollm-frontend:${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Dispatch dependency bump to roo-multitenant
        env:
          TOKEN: ${{ secrets.ROO_MULTITENANT_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/${MULTITENANT_REPO}/dispatches \
            -d "{\"event_type\":\"dependency_tag\",\"client_payload\":{\"component\":\"roollm\",\"tag\":\"${GITHUB_REF_NAME}\"}}"
