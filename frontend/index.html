<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RooLLM:browser interface</title>
    <link href="stylesheet.css" rel="stylesheet">
    <script src="marked.js"></script>

</head>

<body>
    <div id="session-controls">
        <img id="brand-logo" class="hidden" alt="" style="height:28px;">
        <div>
            <button id="history-button">History</button>
            <button id="new-session-button">New Session</button>
            <button id="files-button">Files</button>
        </div>
        <div id="indexer-status"></div>
    </div>
    <div id="files-container" class="hidden">
        <iframe id="files-frame" src="/dufs"></iframe>
    </div>
    <div id="history-container" class="hidden"></div>
    <div id="chat-container">
        <div id="chat"></div>
        <div id="user-input">
            <textarea id="text-input" placeholder="Type your message here..." rows="1"></textarea>
            <button id="submit-button">Send</button>
        </div>
    </div>
    <div id="file-viewer" class="hidden">
        <div id="file-viewer-header">
            <span id="file-viewer-name"></span>
            <button id="file-viewer-close">×</button>
        </div>
        <iframe id="file-viewer-frame"></iframe>
    </div>
    <script src="transforms.js"></script>
    <script src="script.js"></script>
</body>

</html>
