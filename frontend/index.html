<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RooLLM:browser interface</title>
    <link href="stylesheet.css" rel="stylesheet">
    <script src="marked.js"></script>

    <!-- FOUC prevention: overlay + progress sweep while branding loads -->
    <style>
        #branding-loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.35s ease;
            pointer-events: all;
        }
        #branding-loader.done {
            opacity: 0;
            pointer-events: none;
        }
        #branding-loader::before {
            content: '';
            position: absolute;
            top: 0;
            left: -35%;
            width: 35%;
            height: 2px;
            background: #00ff00;
            animation: branding-sweep 1.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes branding-sweep {
            0%   { left: -35%; }
            100% { left: 100%; }
        }
    </style>
    <script>
        window.__brandingPromise = fetch('/branding')
            .then(function(r) { return r.ok ? r.json() : null; })
            .catch(function() { return null; });
    </script>
    <noscript><style>#branding-loader { display: none; }</style></noscript>

</head>

<body>
    <div id="branding-loader"></div>
    <div id="session-controls">
        <img id="brand-logo" class="hidden" alt="" style="height:var(--brand-logo-height,50px);">
        <div>
            <button id="history-button">History</button>
            <button id="new-session-button">New Session</button>
            <button id="files-button">Files</button>
        </div>
        <div id="indexer-status"></div>
    </div>
    <div id="files-container" class="hidden">
        <iframe id="files-frame" src="/dufs"></iframe>
    </div>
    <div id="history-container" class="hidden"></div>
    <div id="chat-container">
        <div id="chat"></div>
        <div id="user-input">
            <textarea id="text-input" placeholder="Type your message here..." rows="1"></textarea>
            <button id="submit-button">Send</button>
        </div>
    </div>
    <div id="file-viewer" class="hidden">
        <div id="file-viewer-header">
            <span id="file-viewer-name"></span>
            <button id="file-viewer-close">×</button>
        </div>
        <iframe id="file-viewer-frame"></iframe>
    </div>
    <script src="transforms.js"></script>
    <script src="script.js"></script>
</body>

</html>
